name: Upload complete repo (e.g. website) to a SFTP destination

on: [push]

jobs:
  Upload-to-SFTP:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: 🚚 Get latest code                     # Checkout the latest code
        uses: actions/checkout@v7

      - name: Install SFTP uploader
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends lftp

      - name: 📂 SFTP uploader                       # Upload to SFTP
        env:
          SFTP_HOST: ${{ secrets.HOST }}
          SFTP_USER: ${{ secrets.USER }}
          SFTP_PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          lftp "sftp://${SFTP_HOST}" <<EOF
          set sftp:auto-confirm yes
          set net:max-retries 3
          set net:timeout 30
          user "${SFTP_USER}" "${SFTP_PASSWORD}"
          mkdir -p /home/greenzeta/comicgenerator.greenzeta.com/
          mirror --reverse --verbose --ignore-time \
            --exclude-glob .git* \
            --exclude-glob .git*/** \
            --exclude-glob .DS_Store \
            --exclude-glob **/.DS_Store \
            --exclude-glob .github/** \
            --exclude-glob .vscode/** \
            ./ /home/greenzeta/comicgenerator.greenzeta.com/
          bye
          EOF